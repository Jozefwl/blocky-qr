opencollection: 1.0.0
info:
  name: BlockyQR
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: Main
      variables:
        - name: server_uri
          value: localhost:3000
items:
  - info:
      name: 404 test
      type: http
      seq: 2
    http:
      method: GET
      url: http://{{server_uri}}/aiosdfniaug
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Main Get
      type: http
      seq: 1
    http:
      method: GET
      url: http://{{server_uri}}/
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: alert-rules
      type: folder
      seq: 6
    request:
      auth: inherit
    docs:
      content: |-
        ## Alert rules

        Alert rules definujú, pri akom stave runu sa má vytvoriť alert.

        - `reportWhenState`: `pending | running | successful | error`
        - Backend overuje, že `pipelineOid` existuje.
      type: text/markdown
    items:
      - info:
          name: Delete rule by ID
          type: http
          seq: 6
        http:
          method: DELETE
          url: http://{{server_uri}}/alert-rules/812928
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `DELETE /alert-rules/:id`
          - **204** no content (alebo **404**)
      - info:
          name: Get all rules
          type: http
          seq: 1
        http:
          method: GET
          url: http://{{server_uri}}/alert-rules/
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /alert-rules`
          - list pravidiel
      - info:
          name: Get rule by ID
          type: http
          seq: 2
        http:
          method: GET
          url: http://{{server_uri}}/alert-rules/69f3888b5a3fef36cf481a2a
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /alert-rules/:id`
          - detail pravidla
      - info:
          name: Make Rule error
          type: http
          seq: 4
        http:
          method: POST
          url: http://{{server_uri}}/alert-rules/
          body:
            type: json
            data: |-
              {
                "name": "Notify on pipeline failure",
                "pipelineOid": "69f28f44c21253f1fbcbb3e9",
                "reportWhenState": "error"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Make Rule success
          type: http
          seq: 3
        http:
          method: POST
          url: http://{{server_uri}}/alert-rules/
          body:
            type: json
            data: |-
              {
                "name": "Notify on pipeline finished",
                "pipelineOid": "69f28f44c21253f1fbcbb3e9",
                "reportWhenState": "successful"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `POST /alert-rules`
          - **Body**:

          ```json
          {
            "name": "Notify on pipeline failure",
            "pipelineOid": "69f28f44c21253f1fbcbb3e9",
            "reportWhenState": "error"
          }
          ```

          - **201**: vytvorené pravidlo
          - **Chyby**: **400** validácia, **404** pipeline not found
      - info:
          name: Patch rule by ID
          type: http
          seq: 5
        http:
          method: PATCH
          url: http://{{server_uri}}/alert-rules/812928
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `PATCH /alert-rules/:id`
          - update: `name`, `pipelineOid`, `reportWhenState`
  - info:
      name: alerts
      type: folder
      seq: 5
    request:
      auth: inherit
    docs:
      content: |
        ## Alerts

        Alerty vznikajú vyhodnotením `alert-rules` pre pipeline. V implementácii majú alerty:
        - `message`, `pipelineOid`, `runId`, `status`, `createdAt`, `acknowledgedAt` (nullable), `alertRuleId` (nullable)

        > Severity nie je explicitné pole v API — UI si ho odvodzuje.
      type: text/markdown
    items:
      - info:
          name: Acknowledge alert
          type: http
          seq: 3
        http:
          method: POST
          url: http://{{server_uri}}/alerts/69f388a05a3fef36cf481a3c/acknowledge
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `POST /alerts/:id/acknowledge`
          - označí alert ako potvrdený (`acknowledgedAt=now`)
      - info:
          name: Get alert by ID
          type: http
          seq: 2
        http:
          method: GET
          url: http://{{server_uri}}/alerts/1337
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /alerts/:id`
          - detail alertu (chyby **400/404**)
      - info:
          name: Get all alerts pipeline
          type: http
          seq: 4
        http:
          method: GET
          url: http://{{server_uri}}/alerts/
          body:
            type: json
            data: |-
              {
                "pipelineOid":"asdff"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Get all alerts
          type: http
          seq: 1
        http:
          method: GET
          url: http://{{server_uri}}/alerts/
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /alerts`
          - **Účel**: list alertov (sort od najnovších).
          - **Filter (pipeline)**:
            - Tento backend číta filter z **JSON body** (nestandardné pre GET).
            - Body:

          ```json
          { "pipelineOid": "69f28f44c21253f1fbcbb3e9" }
          ```
  - info:
      name: datasets
      type: folder
      seq: 7
    request:
      auth: inherit
    docs:
      content: |
        ## Datasets

        Evidence datasetov (metadata). Dataset je nezávislá entita, pipeline nad ním iba beží.

        ### Model (stručne)
        - `name` (string, required)
        - `owner` (string, required)
        - `type` (enum: `aggregation` | `file`, required)
        - `schemaVersion` (number, default 1)
        - `createdAt` (ISO string)
        - `fileType` (object, required ak `type=file`)  
          - `format`: `json` (required)
          - `structure`: string (optional)
        - `fileLink` (string URL, optional ak `type=file`)
        - `aggregation` (object, required ak `type=aggregation`)  
          - `timeFrom` (ISO date, required)
          - `timeTo` (ISO date, required)
      type: text/markdown
    items:
      - info:
          name: Get all datasets
          type: http
          seq: 1
        http:
          method: GET
          url: http://{{server_uri}}/datasets/
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /datasets`
          - **Účel**: list datasetov.
          - **Pozn.**: nezobrazuje/nevypisuje celý obsah `aggregation`.
      - info:
          name: Get dataset by ID
          type: http
          seq: 2
        http:
          method: GET
          url: http://{{server_uri}}/datasets/69f28f34c21253f1fbcbb3e5
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |
          ### `GET /datasets/:id`
          - **Účel**: detail datasetu.
          - **Chyby**:
            - **400** invalid ObjectId
            - **404** dataset not found
      - info:
          name: Make dataset file
          type: http
          seq: 4
        http:
          method: POST
          url: http://{{server_uri}}/datasets/
          body:
            type: json
            data: |-
              {
                "name": "static_export",
                "owner": "ops-team",
                "type": "file",
                "fileType": { "format": "json", "structure": "array-of-objects" },
                "fileLink": "https://example.com/exports/static_export.json"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `POST /datasets`
          - **Účel**: vytvorí dataset.
          **Body (file príklad)** :

          ```json
          {
            "name": "static_export",
            "owner": "ops-team",
            "type": "file",
            "fileType": { "format": "json", "structure": "array-of-objects" },
            "fileLink": "https://example.com/exports/static_export.json"
          }
          ```
          - **201**: `{ status, message, data }`
          - **400**: validačné chyby
      - info:
          name: Make dataset
          type: http
          seq: 3
        http:
          method: POST
          url: http://{{server_uri}}/datasets/
          body:
            type: json
            data: |-
              {
                "name": "logs_feb_to_april",
                "owner": "jozefwaldhauser",
                "type": "aggregation",
                "aggregation": {
                  "timeFrom": "2026-02-01T00:00:00.000Z",
                  "timeTo": "2026-04-29T23:59:59.999Z"
                }
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `POST /datasets`
          - **Účel**: vytvorí dataset.
          - **Body (aggregation príklad)**:

          ```json
          {
            "name": "logs_feb_to_april",
            "owner": "jozefwaldhauser",
            "type": "aggregation",
            "aggregation": {
              "timeFrom": "2026-02-01T00:00:00.000Z",
              "timeTo": "2026-04-29T23:59:59.999Z"
            }
          }
          ```

          - **201**: `{ status, message, data }`
          - **400**: validačné chyby
  - info:
      name: pipelines
      type: folder
      seq: 8
    request:
      auth: inherit
    docs:
      content: |-
        ## Pipelines

        Pipeline vždy odkazuje na existujúci dataset (`datasetOid`).

        ### Pravidlá
        - Pipeline **nevznikne** nad neexistujúcim datasetom (backend kontroluje existenciu).
        - Pipeline sa dá spustiť iba ak `active=true` (inak **409**).
      type: text/markdown
    items:
      - info:
          name: Delete pipeline by ID
          type: http
          seq: 6
        http:
          method: DELETE
          url: http://{{server_uri}}/pipelines/456
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `DELETE /pipelines/:id`
          - **Účel**: zmaže pipeline.
      - info:
          name: Get all pipelines
          type: http
          seq: 1
        http:
          method: GET
          url: http://{{server_uri}}/pipelines/
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /pipelines`
          - **Účel**: list pipeline 
          - (obsahuje aj `lastRunTime`, `lastStatus`, ak existujú).
      - info:
          name: Get pipeline by ID
          type: http
          seq: 2
        http:
          method: GET
          url: http://{{server_uri}}/pipelines/69f28f44c21253f1fbcbb3e9
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /pipelines/:id`
          - **Účel**: detail pipeline.
          - **Chyby**: **400** invalid id, **404** not found
      - info:
          name: Make pipeline
          type: http
          seq: 3
        http:
          method: POST
          url: http://{{server_uri}}/pipelines/
          body:
            type: json
            data: |-
              {
                "name": "daily-aggregation",
                "datasetOid": "69f28f34c21253f1fbcbb3e5",
                "schedule": "0 2 * * *",
                "active": true
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `POST /pipelines`
          - **Účel**: vytvorí pipeline nad datasetom.
          - **Body**:

          ```json
          {
            "name": "daily-aggregation",
            "datasetOid": "69f28f34c21253f1fbcbb3e5",
            "schedule": "0 2 * * *",
            "active": true
          }
          ```

          - **201**: `{ status, message, data }`
          - **Chyby**:
            - **400** validácia / invalid `datasetOid`
            - **404** dataset not found
      - info:
          name: Manual trigger pipeline by ID
          type: http
          seq: 4
        http:
          method: POST
          url: http://{{server_uri}}/pipelines/69f28f44c21253f1fbcbb3e9/run
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `POST /pipelines/:id/run`
          - **Účel**: manuálne spustenie pipeline → vytvorí JobRun (v tejto implementácii rovno so statusom `running`) a nastaví `startTime`.
          - **Body**: `{}` (prázdne)
          - **202**: `{ status, message, data: run }`
          - **Chyby**:
            - **400** invalid pipeline id
            - **404** pipeline not found
            - **409** pipeline is not active
            - **503** ak nie je dostupný RabbitMQ (run sa uloží ako `error` + `errorMessage`)
      - info:
          name: Update pipeline by ID
          type: http
          seq: 5
        http:
          method: PATCH
          url: http://{{server_uri}}/pipelines/69f28f44c21253f1fbcbb3e9
          body:
            type: json
            data: |-
              {
                "lastStatus": "successful"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `PATCH /pipelines/:id`
          - **Účel**: update pipeline.
          - **Pozn.**: backend povoľuje meniť iba: `name`, `datasetOid`, `schedule`, `active`. Každá zmena inkrementuje `pipelineVersion`.
          - **Body príklad**:

          ```json
          { "active": true }
          ```
  - info:
      name: qr-aggregator
      type: folder
      seq: 3
    request:
      auth: inherit
    items:
      - info:
          name: calcStatsAsync
          type: http
          seq: 2
        http:
          method: POST
          url: http://{{server_uri}}/qr-aggregator/calcStatsAsync
          body:
            type: json
            data: |-
              {
                "frequency": "h",
                "timeInterval":{
                  "start":"2026-03-14T07:39:06Z",
                  "end":"2026-03-14T09:39:06Z"
                },
                "cmds":["cmd1"]
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: qr-app
      type: folder
      seq: 4
    request:
      auth: inherit
    docs:
      content: |-
        ### `/qr-app/*`, `/auth/*`
        - Súčasť “QR” časti projektu / experimenty.
        - Nemajú vplyv na minimálne požiadavky Pipeline Monitoru.
      type: text/markdown
    items:
      - info:
          name: getReceipt
          type: http
          seq: 1
        http:
          method: POST
          url: http://{{server_uri}}/qr-app/getReceipt
          body:
            type: json
            data: |-
              {
                "receiptId":"O-50DF7CADC7244B699F7CADC7241B69AD"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: runs
      type: folder
      seq: 9
    request:
      auth: inherit
    docs:
      content: ' **Run / Pipeline status**: `pending` | `running` | `successful` | `error`'
      type: text/markdown
    items:
      - info:
          name: Get all runs
          type: http
          seq: 1
        http:
          method: GET
          url: http://{{server_uri}}/runs/
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /runs`
          - **Účel**: list behov.
      - info:
          name: Get run by ID
          type: http
          seq: 2
        http:
          method: GET
          url: http://{{server_uri}}/runs/69f384af5137fb1a48ce6652
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `GET /runs/:id`
          - **Účel**: detail behu.
          - **Chyby**: **400** invalid id, **404** not found
      - info:
          name: Patch run state by ID
          type: http
          seq: 3
        http:
          method: PATCH
          url: http://{{server_uri}}/runs/678
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          ### `PATCH /runs/:id`
          - **Účel**: v školskom projekte slúži na “dokončenie” simulovaného behu (nastavenie finálneho stavu).
          - **Body**:
            - `status` (required): `pending|running|successful|error`
            - `errorMessage` (required ak `status=error`)
            - `processedRecords` (optional, integer >= 0)
            - `finishTime` (optional ISO date; ak chýba a ideš do finálneho stavu, backend doplní “now”)
          - **Príklad (success)**:

          ```json
          {
            "status": "successful",
            "processedRecords": 12345
          }
          ```

          - **Príklad (error)**:

          ```json
          {
            "status": "error",
            "errorMessage": "Computation failed",
            "processedRecords": 100
          }
          ```

          - **Chyby**:
            - **400** invalid id / validácia body
            - **404** run not found
            - **409** ak je run už vo finálnom stave (`successful` alebo `error`)

          ---
docs:
  content: |-
    # BlockyQR - scanovanie blockov

    TODO, side-project

    ## Big Data Pipeline Monitor (school project)

    Simulácia orchestrace a monitoringu dátových pipeline (nie reálny Spark/Airflow). Backend eviduje datasety, pipeline, behy (runs) a alerty + umožňuje manuálne spustenie pipeline a vyhodnocovanie alert pravidiel.

    ## Základná konfigurácia

    ### API origin
    - Backend default: `http://localhost:3000`
    - Bruno collection používa premennú: `{{server_uri}}` (napr. `localhost:3000`)

    ## Endpointy (API)

    ### Health

    #### `GET /`
    - **Účel**: jednoduchý health endpoint.
    - **200**: `{ "message": "Server QR is running." }`
  type: text/markdown
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-05-07T19:05:19.802Z'
    exportedUsing: Bruno
